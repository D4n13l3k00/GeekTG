services:
  gtg:
    build: .
    image: geektg:latest
    container_name: gtg
    restart: unless-stopped
    stdin_open: true   # нужен для интерактивного логина (ввод кода/пароля)
    tty: true

    # Web UI (initial setup, lavhost-style мониторинг). 8888 = --port в Dockerfile.
    ports:
      - "8888:8888"

    environment:
      # При желании зафиксировать data-dir вручную:
      # GTG_DATA_DIR: /data
      TZ: Europe/Moscow

    volumes:
      # Все runtime-данные: сессии Telethon, config.json, api_token.txt,
      # loaded_modules/, sqlite кеш — один том, легко бэкапить.
      - gtg-data:/home/ftg/.local/share/friendly-telegram

      # Питон-venv. Хранит зависимости стороних модулей (через `# requires:`),
      # переживает `docker compose up --build`. На первом запуске entrypoint
      # засеет его из /opt/gtg-venv, на каждом старте `uv sync --frozen`
      # подравняет под pyproject.toml/uv.lock.
      - gtg-venv:/home/ftg/.venv

      # Опционально: пробросить токены/конфиг с хоста, чтобы первый старт
      # не требовал веб-сетапа. Закомментировано — раскомментируй при нужде.
      # - ./api_token.txt:/home/ftg/.local/share/friendly-telegram/api_token.txt:ro

volumes:
  gtg-data:
  gtg-venv:
